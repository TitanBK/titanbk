<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TitanBK | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

/* FONDO ORIGINAL */

body{
margin:0;
font-family:Arial;
background:linear-gradient(270deg,#0b0f1a,#1e3a8a,#0b0f1a);
background-size:600% 600%;
animation:gradientBG 20s ease infinite;
color:white;
text-align:center;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.sky{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
overflow:hidden;
}

/* estrellas */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3;}
to{opacity:1;}
}

/* luna */

.moon{
position:absolute;
top:80px;
left:-200px;
width:120px;
height:120px;
background:#e5e7eb;
border-radius:50%;
box-shadow:0 0 40px white;
animation:moonMove 40s linear infinite;
}

@keyframes moonMove{
from{left:-200px;}
to{left:110%;}
}

/* CONTENIDO */

.container{
margin-top:120px;
}

/* cabeza */

.head{
width:130px;
border-radius:12px;
border:3px solid #38bdf8;
transition:0.3s;
cursor:pointer;
}

.head:hover{
transform:scale(1.08);
box-shadow:0 0 20px #38bdf8;
}

/* botones */

.buttons{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.btn{
background:#1e3a8a;
padding:14px 28px;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
border:2px solid #38bdf8;
position:relative;
}

/* tooltip */

.btn::after{
content:"Click aquí";
position:absolute;
bottom:120%;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:5px 10px;
border-radius:6px;
font-size:12px;
opacity:0;
pointer-events:none;
transition:0.2s;
white-space:nowrap;
}

.btn:hover::after{
opacity:1;
}

.btn:hover{
background:#2563eb;
transform:translateY(-3px);
box-shadow:0 0 15px #38bdf8;
}

h1{
font-family:'Orbitron',sans-serif;
color:#38bdf8;
}

</style>
</head>

<body>

<div class="sky">

<div class="moon"></div>

<div class="star" style="top:10%;left:20%"></div>
<div class="star" style="top:30%;left:70%"></div>
<div class="star" style="top:50%;left:40%"></div>
<div class="star" style="top:80%;left:10%"></div>
<div class="star" style="top:60%;left:80%"></div>
<div class="star" style="top:20%;left:50%"></div>

</div>

<div class="container">

<h1>TitanBK</h1>

<a href="https://namemc.com/profile/TitanBK" target="_blank">
<img class="head" src="https://mc-heads.net/avatar/TitanBK/130">
</a>

<div class="buttons">

<a class="btn" href="staff.html">
Staff Portfolio
</a>

<a class="btn" href="https://discord.com/users/bosito1 "discord-button>
Contacto
</a>

<a class="btn" href="servidor.html">
Desarrollador de Servidores
</a>

</div>

</div>

</body>
</html>
