<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Página en Desarrollo</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

body{
margin:0;
font-family:Arial;
background:linear-gradient(270deg,#0b0f1a,#1e3a8a,#0b0f1a);
background-size:600% 600%;
animation:gradientBG 20s ease infinite;
color:white;
text-align:center;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* cielo */

.sky{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
overflow:hidden;
}

/* estrellas */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3;}
to{opacity:1;}
}

/* luna */

.moon{
position:absolute;
top:80px;
left:-200px;
width:120px;
height:120px;
background:#e5e7eb;
border-radius:50%;
box-shadow:0 0 40px white;
animation:moonMove 40s linear infinite;
}

@keyframes moonMove{
from{left:-200px;}
to{left:110%;}
}

/* contenido */

.container{
margin-top:200px;
}

h1{
font-family:'Orbitron',sans-serif;
font-size:50px;
color:#38bdf8;
}

p{
color:#94a3b8;
font-size:18px;
}

/* botón regresar */

.back-button{
display:inline-block;
background:#1e3a8a;
color:white;
padding:14px 30px;
margin-top:30px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
border:2px solid #38bdf8;
transition:0.3s;
}

.back-button:hover{
background:#2563eb;
transform:translateY(-3px);
box-shadow:0 0 15px #38bdf8;
}

</style>
</head>

<body>

<div class="sky">

<div class="moon"></div>

<div class="star" style="top:10%;left:20%"></div>
<div class="star" style="top:30%;left:70%"></div>
<div class="star" style="top:50%;left:40%"></div>
<div class="star" style="top:80%;left:10%"></div>
<div class="star" style="top:60%;left:80%"></div>
<div class="star" style="top:20%;left:50%"></div>

</div>

<div class="container">

<h1>🚧 En Desarrollo</h1>

<p>Esta página aún está siendo desarrollada.</p>
<p>Pronto estará disponible.</p>

<a href="https://titanbk.github.io/bosito.github.io/" class="back-button">
← Regresar
</a>

</div>

</body>
</html>
